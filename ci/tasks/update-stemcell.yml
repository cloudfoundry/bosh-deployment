---
platform: linux

image_resource:
  type: registry-image
  source:
    repository: ghcr.io/cloudfoundry/bosh/docker-cpi

inputs:
  - name: bosh-deployment
  - name: stemcell

params:
  CPI_OPS_FILE: ~
  STEMCELL_NAME: ~

outputs:
  - name: bosh-deployment
    path: bosh-deployment-output

run:
  path: bosh-deployment/ci/tasks/update-stemcell.sh