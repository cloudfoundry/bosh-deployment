- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: 7606dc2761f65fe01fc10065817e154ebdd8490d
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.18
    version: 12.3.18
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
