- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: eb7b27b7737b1a408a6a37ea89b40601ca93e660
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.23
    version: 12.3.23
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
