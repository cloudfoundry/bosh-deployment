- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: b757ad6d036e51fff865bbb7b5c46ad77a1ac0dc
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.21
    version: 12.3.21
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
