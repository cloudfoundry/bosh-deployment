- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: 7d4d57bec9ce75721e6542a4bf28ca3d4f190baa
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.26
    version: 12.3.26
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
