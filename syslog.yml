- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: 014cb7f109cb7857a5b10666baa8093e28838d0f
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.17
    version: 12.3.17
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
