- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: 64bfe66eb205913837bfbb4c8297e7ae896b52c4
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.22
    version: 12.3.22
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
