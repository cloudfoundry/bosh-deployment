- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: 23ac36a06c8c88be2d893afd18a586d9de69a517
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.24
    version: 12.3.24
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
