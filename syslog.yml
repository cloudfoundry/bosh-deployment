- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: 470bda8b2a612a548eec9c9557a935a70e3b6542
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.19
    version: 12.3.19
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
