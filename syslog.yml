- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: f1983b3a30886be31836b2755a7969e6df1a6270
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.20
    version: 12.3.20
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
