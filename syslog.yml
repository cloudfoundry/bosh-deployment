- path: /releases/-
  release: syslog
  type: replace
  value:
    name: syslog
    sha1: babb717fc5ec6b80d4e8e4cee56de1f760123b0e
    url: https://bosh.io/d/github.com/cloudfoundry/syslog-release?v=12.3.25
    version: 12.3.25
- path: /instance_groups/name=bosh/jobs/-
  type: replace
  value:
    name: syslog_forwarder
    properties:
      syslog:
        address: ((syslog_address))
        port: ((syslog_port))
        transport: ((syslog_transport))
    release: syslog
